# orchid.yml — embedded-api example
#
# Reuses the restaurant agents config.  Point this file at any
# agents.yaml you want the embedded orchid runtime to load.
#
# Usage::
#
#   ORCHID_CONFIG=examples/embedded-api/orchid.yml \
#       uvicorn examples.embedded-api.my_existing_app:app --port 8000

agents:
  config_path: examples/restaurant/config/agents.yaml

llm:
  model: gemini/gemini-flash-latest

auth:
  dev_bypass: true

rag:
  vector_backend: qdrant
  qdrant_url: http://qdrant:6333
  embedding_model: gemini/gemini-embedding-001

storage:
  class: orchid_ai.persistence.sqlite.OrchidSQLiteChatStorage
  dsn: ~/.orchid/embedded_chats.db

checkpointer:
  type: sqlite
  dsn: ~/.orchid/embedded_checkpoints.db
